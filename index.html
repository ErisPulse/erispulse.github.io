<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ErisPulse - 高性能异步机器人开发框架">
    <meta name="theme-color" content="#4A9CD8">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ErisPulse">
    
    <!-- SEO 优化：单页应用爬虫支持 -->
    <meta name="fragment" content="!">
    <link rel="canonical" href="https://www.erisdev.com/">
    
    <!-- 文档索引配置 -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ErisPulse 文档中心",
        "url": "https://www.erisdev.com/#docs",
        "description": "ErisPulse 框架的完整文档，包括快速开始、开发指南、API参考等",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://www.erisdev.com/#docs?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>
    
    <!-- Open Graph 标签 -->
    <meta property="og:title" content="ErisPulse - 异步机器人开发框架">
    <meta property="og:description" content="ErisPulse 是一个高性能的异步机器人开发框架，支持模块化架构、热重载开发、OneBot12协议兼容等功能。">
    <meta property="og:image" content="https://www.erisdev.com/assets/img/logo.png">
    <meta property="og:url" content="https://www.erisdev.com/">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="zh_CN">
    
    <title>ErisPulse - 异步机器人开发框架</title>

    <!-- PWA 相关 -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/img/logo.png">

    <!-- CSS 样式表 -->
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/home.css">
    <link rel="stylesheet" href="assets/css/market.css">
    <link rel="stylesheet" href="assets/css/markdown.css">
    <link rel="stylesheet" href="assets/css/docs.css">
    <link rel="stylesheet" href="assets/css/setting.css">
    <link rel="stylesheet" href="assets/css/about.css">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ErisPulse",
        "description": "高性能异步机器人开发框架",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Windows, Mac, Linux",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
        }
    }
    </script>

    <!--
       应用入口（原生 ES Module）
       视图片段在启动时由 assets/js/core/views.js 抓取并注入。
    -->
    <script type="module" src="assets/js/app.js"></script>

    <link rel="stylesheet" crossorigin="anonymous" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js" defer></script>
</head>

<body>
    <!-- 加载动画 -->
    <div id="page-loader" class="page-loader">
        <img class="loader-icon" src="assets/img/logo.png">
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="assets/img/logo.png" class="logo" data-view="home">
            <img src="assets/img/logo.png" class="logo-icon" alt="ErisPulse">
            <span>ErisPulse</span>
        </a>

        <button class="hamburger" id="hamburger">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>

        <div class="nav-container" id="nav-container">
            <div class="nav-links">
                <a href="#" class="nav-link active" data-view="home">
                    <i class="fas fa-home"></i> <span class="nav-text" data-i18n="nav.home">首页</span>
                </a>
                <a href="#" class="nav-link" data-view="market">
                    <i class="fas fa-store"></i> <span class="nav-text" data-i18n="nav.market">模块市场</span>
                </a>
                <a href="#" class="nav-link" data-view="docs">
                    <i class="fas fa-book"></i> <span class="nav-text" data-i18n="nav.docs">文档中心</span>
                </a>
                <a href="#" class="nav-link" data-view="settings">
                    <i class="fas fa-cog"></i> <span class="nav-text" data-i18n="nav.settings">设置</span>
                </a>
                <a href="#" class="nav-link" data-view="about">
                    <i class="fas fa-heart"></i> <span class="nav-text" data-i18n="nav.about">我们</span>
                </a>
            </div>
            <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle theme">
                <i class="fas fa-sun" id="theme-toggle-icon"></i>
            </button>
            <!-- 全局语言切换器 -->
            <div class="lang-switcher" id="global-lang-switcher">
                <button class="lang-switcher-btn" id="lang-switcher-btn" aria-label="Switch language">
                    <i class="fas fa-globe"></i>
                    <span class="lang-label">简体中文</span>
                    <i class="fas fa-chevron-down"></i>
                </button>
                <div class="lang-switcher-dropdown">
                    <button class="lang-switcher-option" data-lang="zh-CN">简体中文</button>
                    <button class="lang-switcher-option" data-lang="en">English</button>
                    <button class="lang-switcher-option" data-lang="zh-TW">繁體中文</button>
                    <button class="lang-switcher-option" data-lang="ja">日本語</button>
                    <button class="lang-switcher-option" data-lang="ru">Русский</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区域 -->
    <main class="main-content">

        <!-- 视图片段占位符：启动时由 assets/js/core/views.js 加载 -->
        <div data-fragment-slot="home"></div>
        <div data-fragment-slot="market"></div>
        <div data-fragment-slot="docs"></div>
        <div data-fragment-slot="settings"></div>
        <div data-fragment-slot="about"></div>
        <div data-fragment-slot="modals"></div>
    
    </main>

    <!-- 页脚 -->
    <footer>
        <img class="footer-chan" src="assets/img/ep_chan.png" alt="" loading="lazy">
        <div class="container">
            <div class="footer-content">
                <div class="footer-column">
                    <h3>ErisPulse</h3>
                    <ul class="footer-links">
                        <li><a href="https://github.com/ErisPulse/ErisPulse"><i class="fas fa-home"></i> <span data-i18n="footer.home">项目主页</span></a></li>
                        <li><a href="#docs"><i class="fas fa-book"></i> <span data-i18n="footer.docs">使用文档</span></a></li>
                    </ul>
                </div>

                <div class="footer-column">
                    <h3 data-i18n="footer.contribute">贡献与开发</h3>
                    <ul class="footer-links">
                        <li><a href="https://github.com/ErisPulse/ErisPulse/issues"><i class="fas fa-code"></i>
                                <span data-i18n="footer.issue">报告Issue</span></a></li>
                        <li><a href="https://github.com/ErisPulse/ErisPulse/pulls"><i class="fas fa-code-branch"></i>
                                <span data-i18n="footer.pr">提交PR</span></a></li>
                        <li><a href="https://github.com/ErisPulse/ErisPulse/discussions"><i class="fas fa-comments"></i>
                                <span data-i18n="footer.discussions">讨论区</span></a></li>
                    </ul>
                </div>

                <div class="footer-column">
                    <h3 data-i18n="footer.social">社交平台</h3>
                    <ul class="footer-links">
                        <li><a href="https://qm.qq.com/q/TOwnCmypcy"><i class="fab fa-qq"></i> QQ</a></li>
                        <li><a href="https://github.com/ErisPulse"><i class="fab fa-github"></i> GitHub</a></li>
                        <li><a href="https://t.me/ErisPulse"><i class="fab fa-telegram"></i> Telegram</a></li>
                        <li><a href="https://yhfx.jwznb.com/share?key=mr0vMbXhKJGt&ts=1770192749"><img src="assets/img/yunhu.png" alt="云湖" width="20" height="20"> 云湖</a></li>
                    </ul>
                </div>

            </div>

            <div class="copyright">
                &copy; 2026 ErisPulse Project | <span data-i18n="footer.copyright">开源许可证：MIT</span>
            </div>
        </div>
    </footer>
</body>

</html>

<div id="settings-view" class="view-container">
    <div class="container">
        <section class="settings">
            <h2 class="section-title" data-i18n="settings.title">个性化设置</h2>
            <p class="section-subtitle" data-i18n="settings.subtitle">
                自定义您的 ErisPulse 体验
            </p>

            <div class="settings-grid">
                <!-- 动画设置 -->
                <div class="setting-card">
                    <h3 class="setting-title">
                        <i class="fas fa-magic"></i>
                        <span data-i18n="settings.animations">动画效果</span>
                    </h3>
                    <div class="setting-content">
                        <div class="toggle-setting">
                            <label
                                for="animations-toggle"
                                data-i18n="settings.animationsToggle"
                                >启用动画效果</label
                            >
                            <div class="toggle-switch">
                                <input
                                    type="checkbox"
                                    id="animations-toggle"
                                    class="toggle-input"
                                />
                                <label
                                    for="animations-toggle"
                                    class="toggle-label"
                                ></label>
                            </div>
                        </div>
                        <p
                            class="setting-description"
                            data-i18n="settings.animationsDesc"
                        >
                            控制页面过渡动画和交互效果
                        </p>
                    </div>
                </div>

                <!-- 内容设置 -->
                <div class="setting-card">
                    <h3 class="setting-title">
                        <i class="fas fa-file-alt"></i>
                        <span data-i18n="settings.content">内容偏好</span>
                    </h3>
                    <div class="setting-content">
                        <div class="toggle-setting">
                            <label
                                for="compact-layout"
                                data-i18n="settings.compact"
                                >紧凑布局</label
                            >
                            <div class="toggle-switch">
                                <input
                                    type="checkbox"
                                    id="compact-layout"
                                    class="toggle-input"
                                />
                                <label
                                    for="compact-layout"
                                    class="toggle-label"
                                ></label>
                            </div>
                        </div>
                        <p
                            class="setting-description"
                            data-i18n="settings.compactDesc"
                        >
                            减少页面间距，显示更多内容
                        </p>

                        <div class="toggle-setting">
                            <label
                                for="show-line-numbers"
                                data-i18n="settings.lineNumbers"
                                >显示代码行号</label
                            >
                            <div class="toggle-switch">
                                <input
                                    type="checkbox"
                                    id="show-line-numbers"
                                    class="toggle-input"
                                />
                                <label
                                    for="show-line-numbers"
                                    class="toggle-label"
                                ></label>
                            </div>
                        </div>
                        <p
                            class="setting-description"
                            data-i18n="settings.lineNumbersDesc"
                        >
                            在代码块中显示行号
                        </p>
                    </div>
                </div>

                <!-- 导航设置 -->
                <div class="setting-card">
                    <h3 class="setting-title">
                        <i class="fas fa-bars"></i>
                        <span data-i18n="settings.nav">导航设置</span>
                    </h3>
                    <div class="setting-content">
                        <div class="toggle-setting">
                            <label
                                for="sticky-nav"
                                data-i18n="settings.stickyNav"
                                >固定导航栏</label
                            >
                            <div class="toggle-switch">
                                <input
                                    type="checkbox"
                                    id="sticky-nav"
                                    class="toggle-input"
                                    checked
                                />
                                <label
                                    for="sticky-nav"
                                    class="toggle-label"
                                ></label>
                            </div>
                        </div>
                        <p
                            class="setting-description"
                            data-i18n="settings.stickyNavDesc"
                        >
                            滚动时保持导航栏可见
                        </p>
                    </div>
                </div>

                <!-- 文档离线本地化 -->
                <div class="setting-card">
                    <h3 class="setting-title">
                        <i class="fas fa-cloud-download-alt"></i>
                        <span data-i18n="settings.docsCache">文档离线缓存</span>
                    </h3>
                    <div class="setting-content">
                        <div class="toggle-setting">
                            <label
                                for="disable-online-refresh"
                                data-i18n="settings.offlineFirst"
                                >离线优先模式</label
                            >
                            <div class="toggle-switch">
                                <input
                                    type="checkbox"
                                    id="disable-online-refresh"
                                    class="toggle-input"
                                    checked
                                />
                                <label
                                    for="disable-online-refresh"
                                    class="toggle-label"
                                ></label>
                            </div>
                        </div>
                        <p
                            class="setting-description"
                            data-i18n="settings.offlineFirstDesc"
                        >
                            开启后优先使用本地缓存的文档，仅在无缓存时联网获取；断网时自动使用缓存且不会清理
                        </p>

                        <div class="docs-cache-actions">
                            <button
                                id="manage-docs-cache-btn"
                                class="btn btn-outline"
                            >
                                <i class="fas fa-layer-group"></i>
                                <span data-i18n="settings.manageDocsCache"
                                    >管理缓存</span
                                >
                            </button>
                        </div>
                    </div>
                </div>

                <!-- AI 模块构建器配置 -->
                <div class="setting-card">
                    <h3 class="setting-title">
                        <i class="fas fa-wand-magic-sparkles"></i>
                        <span data-i18n="builder.settingsTitle"
                            >AI 模块构建器</span
                        >
                    </h3>
                    <div class="setting-content">
                        <div class="builder-setting-field">
                            <label
                                for="builder-api-url"
                                data-i18n="builder.apiUrl"
                                >API 地址</label
                            >
                            <input
                                type="text"
                                id="builder-api-url"
                                class="builder-setting-input"
                                autocomplete="off"
                                spellcheck="false"
                                data-i18n-placeholder="builder.apiUrlPlaceholder"
                            />
                        </div>
                        <div class="builder-setting-field">
                            <label
                                for="builder-api-key"
                                data-i18n="builder.apiKey"
                                >API Key</label
                            >
                            <div class="builder-key-row">
                                <input
                                    type="password"
                                    id="builder-api-key"
                                    class="builder-setting-input"
                                    autocomplete="off"
                                    spellcheck="false"
                                    data-i18n-placeholder="builder.apiKeyPlaceholder"
                                />
                                <i
                                    class="fas fa-eye builder-toggle-eye"
                                    id="builder-toggle-key"
                                    data-i18n-title="builder.showKey"
                                ></i>
                            </div>
                        </div>
                        <div class="builder-setting-field">
                            <label for="builder-model" data-i18n="builder.model"
                                >模型</label
                            >
                            <input
                                type="text"
                                id="builder-model"
                                class="builder-setting-input"
                                autocomplete="off"
                                spellcheck="false"
                                data-i18n-placeholder="builder.modelPlaceholder"
                            />
                        </div>
                        <div class="toggle-setting">
                            <label
                                for="builder-persist-key"
                                data-i18n="builder.persistKey"
                                >记住密钥（仅本机）</label
                            >
                            <div class="toggle-switch">
                                <input
                                    type="checkbox"
                                    id="builder-persist-key"
                                    class="toggle-input"
                                />
                                <label
                                    for="builder-persist-key"
                                    class="toggle-label"
                                ></label>
                            </div>
                        </div>
                        <p
                            class="setting-description"
                            data-i18n="builder.settingsDesc"
                        >
                            配置构建器使用的 OpenAI 兼容
                            API。前往「构建器」页面开始对话。
                        </p>
                    </div>
                </div>

                <!-- 重置设置 -->
                <div class="setting-card">
                    <h3 class="setting-title">
                        <i class="fas fa-undo"></i>
                        <span data-i18n="settings.reset">重置设置</span>
                    </h3>
                    <div class="setting-content">
                        <button id="reset-settings" class="btn btn-outline">
                            <i class="fas fa-trash-alt"></i>
                            <span data-i18n="settings.resetBtn"
                                >重置所有设置</span
                            >
                        </button>
                        <p
                            class="setting-description"
                            data-i18n="settings.resetDesc"
                        >
                            将所有设置恢复为默认值
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

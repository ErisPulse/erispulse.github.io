        <div id="market-view" class="view-container">
            <div class="container market-container">
                <div class="market-header">
                    <h2 class="section-title" data-i18n="market.title">模块市场</h2>
                    <div class="search-container">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="search-input" id="module-search" data-i18n-placeholder="market.search" placeholder="搜索模块...">
                    </div>
                </div>

                <!-- 模块市场统计信息 -->
                <div class="market-stats">
                    <div class="stats-grid">
                        <div class="stat-card stat-card-highlight">
                            <div class="stat-number" id="total-all-modules">--</div>
                            <div class="stat-label" data-i18n="market.total">总模块数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number" id="total-modules">--</div>
                            <div class="stat-label" data-i18n="market.modules">功能模块</div>
                        </div>

                        <div class="stat-card">
                            <div class="stat-number" id="adapter-count">--</div>
                            <div class="stat-label" data-i18n="market.adapters">平台适配器</div>
                        </div>


                    </div>
                </div>

                <div class="module-categories">
                    <button class="category-btn active" data-category="all" data-i18n="market.all">全部模块</button>
                    <button class="category-btn" data-category="modules" data-i18n="market.modules">功能模块</button>
                    <button class="category-btn" data-category="adapters" data-i18n="market.adapters">平台适配器</button>
                    <button class="submit-module-link" id="submit-module-btn">
                        <i class="fas fa-plus"></i> <span data-i18n="market.submit">提交模块</span>
                    </button>
                </div>

                <div class="module-grid" id="modules-grid">
                    <!-- 模块卡片将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="docs-cache-modal">
            <div class="modal docs-cache-modal">
                <div class="modal-header">
                    <h3 class="modal-title" data-i18n="settings.docsCacheManageTitle">文档缓存管理</h3>
                    <button class="close-btn" id="close-docs-cache-modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <p class="setting-description" data-i18n="settings.docsCacheManageDesc">查看并清理各语言已缓存的文档内容；“下载/更新”会下载或刷新该语言的完整离线缓存。</p>
                    <div id="docs-cache-lang-table" class="docs-cache-lang-table"></div>
                    <div id="docs-download-progress" class="docs-download-progress" style="display:none;">
                        <div class="docs-download-progress-track">
                            <div id="docs-download-progress-bar" class="docs-download-progress-bar"></div>
                        </div>
                        <span id="docs-download-progress-text" class="docs-download-progress-text"></span>
                    </div>
                    <div class="docs-cache-actions docs-cache-actions-secondary">
                        <button id="clear-all-docs-cache-btn" class="btn btn-outline">
                            <i class="fas fa-broom"></i> <span data-i18n="settings.clearAllDocsCache">清除全部缓存</span>
                        </button>
                    </div>
                    <p id="docs-cache-version-hint" class="docs-cache-version-hint" style="display:none;"></p>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="submit-module-modal">
            <div class="modal submit-modal">
                <div class="modal-header">
                    <h3 class="modal-title" data-i18n="submit.title">提交模块</h3>
                    <button class="close-btn" id="close-submit-modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="submit-modal-content">
                        <!-- 未登录状态 -->
                        <div id="submit-login-state" class="submit-login-state">
                            <div class="submit-login-icon">
                                <i class="fas fa-user-circle"></i>
                            </div>
                            <h4 data-i18n="submit.loginTitle">选择登录方式</h4>
                            <p data-i18n="submit.loginDesc">登录后即可提交您的模块到 ErisPulse 生态系统</p>
                            <div class="submit-login-buttons">
                                <button class="btn btn-github-login" data-provider="github">
                                    <i class="fab fa-github"></i> <span>GitHub</span>
                                </button>
                                <button class="btn btn-codeberg-login" data-provider="codeberg">
                                    <img src="assets/img/codeberg.svg" alt="Codeberg" width="18" height="18"> <span>Codeberg</span>
                                </button>
                                <button class="btn btn-yunhu-login" data-provider="yunhu">
                                    <img src="assets/img/yunhu.png" alt="云湖" width="18" height="18"> <span data-i18n="submit.loginYunhu">云湖</span>
                                </button>
                            </div>
                        </div>

                        <!-- 已登录 + 表单状态 -->
                        <div id="submit-form-state" class="submit-form-state" style="display:none;">
                            <div class="submit-user-info">
                                <img id="submit-user-avatar" src="" alt="" class="submit-user-avatar" referrerpolicy="no-referrer">
                                <span id="submit-user-name" class="submit-user-name"></span>
                                <button class="btn btn-outline btn-sm" id="github-logout-btn" data-i18n="submit.logout">退出登录</button>
                            </div>

                            <div class="submit-tabs">
                                <button class="submit-tab active" data-tab="submit" data-i18n="submit.tabSubmit">提交模块</button>
                                <button class="submit-tab" data-tab="my-modules" data-i18n="submit.tabMyModules">我的模块</button>
                            </div>

                            <div id="tab-submit" class="submit-tab-content">
                            <form id="submit-module-form" class="submit-form">
                                <div class="form-group">
                                    <label data-i18n="submit.type">提交类型</label>
                                    <select id="submit-type" class="form-select" required>
                                        <option value="module" data-i18n="submit.typeModule">模块 (Module)</option>
                                        <option value="adapter" data-i18n="submit.typeAdapter">适配器 (Adapter)</option>
                                    </select>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label data-i18n="submit.name">模块名称</label>
                                        <input type="text" id="submit-name" class="form-input" placeholder="MyModule" required pattern="[a-zA-Z0-9_\-]+">
                                        <span class="form-hint" data-i18n="submit.nameHint">英文、数字、下划线、连字符</span>
                                    </div>
                                    <div class="form-group">
                                        <label data-i18n="submit.package">PyPI 包名</label>
                                        <input type="text" id="submit-package" class="form-input" placeholder="ErisPulse-MyModule" required>
                                        <span class="form-hint" data-i18n="submit.packageHint">包必须已发布到 PyPI</span>
                                    </div>
                                </div>

                                <div class="form-group">
                                    <label data-i18n="submit.description">描述</label>
                                    <textarea id="submit-description" class="form-textarea" rows="3" required data-i18n-placeholder="submit.descriptionPlaceholder" placeholder="简要描述模块功能..."></textarea>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label data-i18n="submit.author">作者</label>
                                        <input type="text" id="submit-author" class="form-input" required>
                                    </div>
                                    <div class="form-group">
                                        <label data-i18n="submit.repository">仓库地址</label>
                                        <input type="url" id="submit-repository" class="form-input" placeholder="https://github.com/user/repo" required>
                                    </div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label data-i18n="submit.minSdkVersion">最低 SDK 版本</label>
                                        <input type="text" id="submit-min-sdk" class="form-input" placeholder="2.0.0">
                                    </div>
                                    <div class="form-group">
                                        <label data-i18n="submit.tags">标签</label>
                                        <input type="text" id="submit-tags" class="form-input" data-i18n-placeholder="submit.tagsPlaceholder" placeholder="用逗号分隔，如：工具,AI,解析">
                                    </div>
                                </div>

                                <div class="submit-form-actions">
                                    <button type="submit" class="btn btn-primary" id="submit-confirm-btn">
                                        <i class="fas fa-paper-plane"></i> <span data-i18n="submit.submitBtn">提交</span>
                                    </button>
                                </div>
                            </form>
                            </div>

                            <div id="tab-my-modules" class="submit-tab-content" style="display:none;">
                                <div id="my-modules-list" class="my-modules-list">
                                    <div class="my-modules-loading">
                                        <i class="fas fa-spinner fa-spin"></i> <span data-i18n="manage.loading">加载中...</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 提交成功状态 -->
                        <div id="submit-success-state" class="submit-success-state" style="display:none;">
                            <div class="submit-success-icon">
                                <i class="fas fa-check-circle"></i>
                            </div>
                            <h4 data-i18n="submit.successTitle">提交成功!</h4>
                            <p data-i18n="submit.successDesc">您的模块已提交，等待管理员验证后将正式显示在模块市场中。</p>
                            <button class="btn btn-primary" id="submit-another-btn" data-i18n="submit.submitAnother">继续提交</button>
                        </div>

                        <!-- 提交失败状态 -->
                        <div id="submit-error-state" class="submit-error-state" style="display:none;">
                            <div class="submit-error-icon">
                                <i class="fas fa-exclamation-circle"></i>
                            </div>
                            <h4 data-i18n="submit.errorTitle">提交失败</h4>
                            <p id="submit-error-message"></p>
                            <button class="btn btn-primary" id="submit-retry-btn" data-i18n="submit.retryBtn">重试</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="module-modal">
            <div class="modal">
                <div class="modal-header">
                    <h3 class="modal-title" data-i18n="modal.moduleDetail">模块详情</h3>
                    <button class="close-btn" id="close-modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="module-modal-content">
                        <!-- 模块详情内容将通过JavaScript动态加载 -->
                    </div>
                </div>
            </div>
        </div>
